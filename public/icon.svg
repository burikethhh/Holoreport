<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="holo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4a9eff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Corner HUD brackets -->
  <g stroke="url(#glow)" stroke-width="2.5" fill="none" filter="url(#softglow)" stroke-linecap="round">
    <!-- Top-left -->
    <polyline points="110,120 110,100 130,100"/>
    <!-- Top-right -->
    <polyline points="382,100 402,100 402,120"/>
    <!-- Bottom-left -->
    <polyline points="110,360 110,380 130,380"/>
    <!-- Bottom-right -->
    <polyline points="382,380 402,380 402,360"/>
  </g>

  <!-- Holographic diamond / prism shape -->
  <g filter="url(#neon)">
    <!-- Main diamond -->
    <polygon points="256,130 340,240 256,350 172,240" fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner diamond -->
    <polygon points="256,165 315,240 256,315 197,240" fill="url(#holo)" fill-opacity="0.08" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.5" stroke-linejoin="round"/>
    <!-- Horizontal line through center -->
    <line x1="172" y1="240" x2="340" y2="240" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Cross vertical -->
    <line x1="256" y1="130" x2="256" y2="350" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.2"/>
  </g>

  <!-- "H" letterform in center (stylized) -->
  <g filter="url(#neon)">
    <text x="256" y="255" text-anchor="middle" dominant-baseline="central"
          font-family="'Segoe UI', 'Arial', sans-serif" font-size="80" font-weight="700"
          fill="url(#glow)" letter-spacing="-2">H</text>
  </g>

  <!-- Small scan lines decoration -->
  <g stroke="#4a9eff" stroke-opacity="0.12" stroke-width="1">
    <line x1="120" y1="185" x2="392" y2="185"/>
    <line x1="140" y1="200" x2="372" y2="200"/>
    <line x1="140" y1="280" x2="372" y2="280"/>
    <line x1="120" y1="295" x2="392" y2="295"/>
  </g>

  <!-- Dot accents at diamond vertices -->
  <g fill="#00d4ff" filter="url(#softglow)">
    <circle cx="256" cy="130" r="4"/>
    <circle cx="340" cy="240" r="4"/>
    <circle cx="256" cy="350" r="4"/>
    <circle cx="172" cy="240" r="4"/>
  </g>

  <!-- "HOLOREPORT" text -->
  <text x="256" y="420" text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif" font-size="36" font-weight="700"
        fill="#ffffff" letter-spacing="6" filter="url(#softglow)">HOLOREPORT</text>

  <!-- "by Keth" trademark -->
  <text x="256" y="452" text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif" font-size="14" font-weight="400"
        fill="#4a9eff" letter-spacing="3" opacity="0.7">by Keth &#8482;</text>

  <!-- Subtle data particles -->
  <g fill="#00d4ff" opacity="0.4">
    <circle cx="145" cy="155" r="1.5"/>
    <circle cx="370" cy="165" r="1"/>
    <circle cx="155" cy="310" r="1"/>
    <circle cx="365" cy="325" r="1.5"/>
    <circle cx="200" cy="140" r="1"/>
    <circle cx="310" cy="340" r="1"/>
  </g>
</svg>
